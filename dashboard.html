<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Dashboard</h2>

<p id="balance">₹0</p>
<p id="bonus">Bonus ₹0</p>

<h3>Buy</h3>
<input id="amount" placeholder="Amount">
<button onclick="buy('bank')">Bank 10%</button>
<button onclick="buy('upi')">UPI 7%</button>

<h3>Withdraw</h3>
<input id="wamount">
<button onclick="withdraw()">Withdraw</button>

<h3>History</h3>
<div id="history"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
